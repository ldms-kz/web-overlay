<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учет компьютеров</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f7f6;
        }
        h2 {
            color: #333;
            text-align: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #4CAF50;
            color: white;
            text-transform: uppercase;
            font-size: 14px;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: auto;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Список компьютерной техники</h2>
    <table>
        <thead>
            <tr>
                <th>Наименование компьютера</th>
                <th>Количество</th>
                <th>Ответственный пользователь</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Workstation Dell Precision</td>
                <td>2</td>
                <td>Иванов Иван</td>
            </tr>
            <tr>
                <td>MacBook Pro 14"</td>
                <td>5</td>
                <td>Отдел дизайна</td>
            </tr>
            <tr>
                <td>Lenovo ThinkPad X1</td>
                <td>3</td>
                <td>Петров Петр</td>
            </tr>
            <tr>
                <td>iMac 27"</td>
                <td>1</td>
                <td>Сидоров Алексей</td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
